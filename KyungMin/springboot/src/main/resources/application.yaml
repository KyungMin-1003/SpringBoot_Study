spring:
  application:
    name: springboot

  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:springboot;MODE=MySQL;DATABASE_TO_LOWER=TRUE
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  h2:
    console:
      enabled: true